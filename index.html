<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mia Farina | Portfolio</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- AOS -->
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet"/>

  <style>
    :root{
      /* Unified palette: tweak these to quickly retheme */
      --bg: #F8FAFF;            /* page background */
      --surface: #FFFFFF;       /* cards and surfaces */
      --ink: #0F172A;           /* primary text */
      --muted: #475569;         /* secondary text */
      --brand-50: #EEF2FF;      /* indigo 50 */
      --brand-100:#E0E7FF;      /* indigo 100 */
      --accent-50:#FDF2F8;      /* pink 50 */
      --accent-100:#FCE7F3;     /* pink 100 */
      --tint: #F5F7FF;          /* subtle section tint */
    }

    /* Animated hero background */
    @keyframes gradientMove {
      0% {background-position:0% 50%;}
      50% {background-position:100% 50%;}
      100% {background-position:0% 50%;}
    }
    .animate-gradient{
      background-size:200% 200%;
      animation:gradientMove 14s ease-in-out infinite;
    }

    /* Feather the bottom of the hero so it blends into next section */
    .hero-fade {
      mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 70%, rgba(0,0,0,0));
      -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 70%, rgba(0,0,0,0));
    }

    /* Accessible focus */
    :focus-visible {
      outline: 3px solid #A5B4FC;
      outline-offset: 2px;
      border-radius: 8px;
    }
  </style>
</head>

<body class="bg-[var(--bg)] text-[var(--ink)] scroll-smooth pt-20">

  <!-- NAVBAR -->
  <header id="navbar" class="fixed top-0 left-0 w-full z-50 transition-all duration-300">
    <div class="max-w-6xl mx-auto flex justify-between items-center px-6 md:px-8 py-4">
      <h1 class="text-base md:text-lg font-semibold">Mia Farina</h1>
      <nav class="hidden sm:flex gap-5 text-sm text-[var(--muted)]">
        <a href="#about" class="hover:text-indigo-600">About</a>
        <a href="#experience" class="hover:text-indigo-600">Experience</a>
        <a href="#projects" class="hover:text-indigo-600">Projects</a>
        <a href="#building" class="hover:text-indigo-600">Building</a>
        <a href="#contact" class="hover:text-indigo-600">Contact</a>
      </nav>
    </div>
  </header>

  <!-- HERO -->
  <section class="relative pt-28 md:pt-36 pb-24 md:pb-32 overflow-hidden">
    <!-- Animated background -->
    <div
      class="absolute inset-0 -z-10 animate-gradient hero-fade"
      style="
        background-image:
          radial-gradient(1200px 500px at 20% 0%, var(--brand-100), transparent 70%),
          radial-gradient(900px 400px at 80% 10%, var(--accent-100), transparent 70%),
          linear-gradient(90deg, var(--brand-50), var(--brand-100), var(--accent-50));
      ">
    </div>

    <div class="max-w-6xl mx-auto px-6 md:px-8">
      <div class="mx-auto max-w-3xl text-center">
        <h2 class="text-4xl md:text-5xl font-bold tracking-tight leading-tight mb-6">
          Building systems that help people succeed
        </h2>
